<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — GO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --muted: #999;
      --dim: #666;
      --border: #e8e8e5;
      --border-hover: #ccc;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Unbounded', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center { text-align: center; padding: 32px; }

    .center__code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      opacity: 0.08;
      letter-spacing: -0.04em;
    }

    .center__title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: -8px;
    }

    .center__desc {
      font-size: 12px;
      font-weight: 300;
      color: var(--dim);
      margin-top: 14px;
      line-height: 1.7;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .links {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 24px;
      transition: border-color 0.25s, color 0.25s;
      letter-spacing: 0.03em;
    }

    .links a:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    @media (max-width: 480px) {
      .center__code { font-size: 80px; }
      .center__title { font-size: 15px; }
      .links a { font-size: 10px; padding: 8px 18px; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="center__code">404</div>
    <div class="center__title">Страница не найдена</div>
    <div class="center__desc">
      Такой страницы нет. Может, вы ошиблись адресом, или она была перемещена.
    </div>
    <div class="links">
      <a href="https://doinwor.github.io/go-ecosystem/">GO</a>
      <a href="https://doinwor.github.io/go-ecosystem/i-site/">і. студия</a>
      <a href="https://doinwor.github.io/go-ecosystem/i-site/brand.html">Бренд</a>
      <a href="https://doinwor.github.io/go-ecosystem/i-site/digital.html">Digital</a>
    </div>
  </div>
  <script>
    var path = window.location.pathname;
    if (path.indexOf('/i-site/') !== -1) {
      window.location.href = 'https://doinwor.github.io/go-ecosystem/i-site/404.html';
    }
  </script>
</body>
</html>
