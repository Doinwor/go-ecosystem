<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>і. — заставка 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Unbounded', 'Helvetica Neue', Arial, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      animation: fadeInOut 4s ease forwards;
    }

    .logo__row {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    .logo__i {
      font-size: 200px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1;
    }

    .logo__studio {
      font-size: 200px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: 0.18em;
    }

    .logo__support {
      font-size: 11px;
      font-weight: 300;
      color: #bbb;
      letter-spacing: 0.15em;
      margin-top: 36px;
    }

    .logo__go {
      font-size: 11px;
      font-weight: 400;
      color: #ccc;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    @keyframes fadeInOut {
      0%   { opacity: 0; }
      10%  { opacity: 0; }
      37%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo__row">
        <span class="logo__i">і.</span>
        <span class="logo__studio">Studio</span>
      </div>
      <span class="logo__support">при поддержке</span>
      <span class="logo__go">Экосистема проектов GO</span>
    </div>
  </div>
</body>
</html>
