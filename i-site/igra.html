<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🐹 Крот-собиратель — i.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
@keyframes bgDrift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
body{background:#0d0a08;min-height:100vh;min-height:-webkit-fill-available;display:flex;justify-content:center;align-items:center;font-family:'Unbounded','Segoe UI',system-ui,sans-serif;touch-action:manipulation;padding:10px;overscroll-behavior:none;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 0%,#1f1410 0%,#0d0a08 60%,#0a0604 100%);opacity:.8}
body::after{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(2px 2px at 20% 30%,rgba(255,215,0,.03),transparent 200px),radial-gradient(2px 2px at 80% 70%,rgba(196,154,108,.03),transparent 200px);pointer-events:none}
.menu-screen{z-index:1000;background:radial-gradient(ellipse at 50% 40%,#2a1f18,#0d0a08);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .5s ease,transform .5s ease;position:fixed;inset:0}

.menu-screen{position:fixed;inset:0;z-index:1000;background:radial-gradient(ellipse at 50% 40%,#2a1f18,#0d0a08);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .5s ease,transform .5s ease}
.menu-screen.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
.menu-icon{font-size:80px;margin-bottom:10px;animation:menuMole 2s ease-in-out infinite}
@keyframes menuMole{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.menu-title{font-size:42px;color:#d4c4a8;font-weight:bold;text-shadow:0 4px 20px rgba(0,0,0,.6);margin-bottom:6px}
.menu-sub{font-size:15px;color:#8b7b6a;margin-bottom:36px}
.menu-play{background:linear-gradient(180deg,#f0c896,#c49a6c);border:none;color:#1f1814;font-size:24px;font-weight:bold;padding:18px 70px;border-radius:60px;box-shadow:0 8px 0 #8b6b40,0 0 40px rgba(196,154,108,.2);cursor:pointer;transition:all .08s linear;touch-action:manipulation;margin-bottom:14px;letter-spacing:1px}
.menu-play:active{transform:translateY(6px);box-shadow:0 2px 0 #8b6b40,0 0 40px rgba(196,154,108,.2)}
.menu-sound{background:none;border:2px solid #3d3224;color:#8b7b6a;font-size:22px;cursor:pointer;padding:8px 18px;border-radius:40px;transition:all .2s;touch-action:manipulation;margin-bottom:12px}
.menu-sound:active{transform:scale(.9)}
.menu-ach-btn{background:none;border:2px solid #3d3224;color:#c49a6c;font-size:15px;cursor:pointer;padding:8px 20px;border-radius:40px;transition:all .2s;touch-action:manipulation;margin-bottom:10px}
.menu-ach-btn:active{transform:scale(.95)}
.menu-credits{color:#4a3a2a;font-size:14px;position:absolute;bottom:30px}
.menu-credits a{color:#8b6b40;text-decoration:none;transition:color .2s}
.menu-credits a:hover{color:#d4c4a8}
.menu-back{background:#1a130e;border:2px solid #3d3224;color:#8b7b6a;font-size:13px;cursor:pointer;padding:10px 24px;border-radius:40px;transition:all .2s;touch-action:manipulation;margin-bottom:10px;font-family:'Unbounded','Segoe UI',sans-serif;letter-spacing:.03em}
.menu-back:hover{color:#d4c4a8;border-color:#8b6b40;background:#221a14;box-shadow:0 0 20px rgba(196,154,108,.05)}
.menu-back:active{transform:scale(.95)}
.menu-back .arrow{display:inline-block;transition:transform .2s}
.menu-back:hover .arrow{transform:translateX(-3px)}

.ach-screen{position:fixed;inset:0;z-index:1100;background:rgba(13,10,8,.95);display:flex;flex-direction:column;align-items:center;padding:30px 20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .3s ease}
.ach-screen.show{opacity:1;pointer-events:auto}
.ach-screen-title{font-size:32px;color:#ffd700;font-weight:bold;margin-bottom:6px}
.ach-screen-sub{font-size:14px;color:#8b7b6a;margin-bottom:20px}
.ach-list{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ach-item{background:#1f1814;border-radius:16px;padding:10px 14px;display:flex;align-items:center;gap:12px;border:2px solid #3d3224;transition:all .2s}
.ach-item.unlocked{border-color:#ffd70066;background:#2a2218}
.ach-icon{font-size:28px;width:40px;text-align:center}
.ach-info{flex:1}
.ach-name{color:#d4c4a8;font-weight:bold;font-size:14px}
.ach-desc{color:#6a5a4a;font-size:12px}
.ach-item.unlocked .ach-name{color:#ffd700}
.ach-item.unlocked .ach-desc{color:#c49a6c}
.ach-status{font-size:16px;color:#3d3224}
.ach-item.unlocked .ach-status{color:#ffd700}
.ach-close-btn{background:#3d3224;border:none;color:#d4c4a8;font-size:16px;font-weight:bold;padding:12px 40px;border-radius:40px;box-shadow:0 4px 0 #1a130e;cursor:pointer;transition:all .06s linear;touch-action:manipulation}
.ach-close-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #1a130e}

.ach-banner{position:fixed;right:20px;top:-80px;z-index:9999;background:linear-gradient(135deg,#2a1f18,#1f1814);border:2px solid #ffd70066;border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 10px 40px rgba(0,0,0,.9);transition:top .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px}
.ach-banner.show{top:20px}
.ach-banner-icon{font-size:28px;flex-shrink:0}
.ach-banner-info{flex:1;min-width:0}
.ach-banner-title{color:#ffd700;font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ach-banner-desc{color:#c49a6c;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:640px){.ach-banner{right:10px;left:10px;max-width:none}.ach-banner.show{top:10px}}

.gameover-screen{position:absolute;inset:0;z-index:300;background:rgba(13,10,8,.95);border-radius:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;opacity:0;pointer-events:none;transition:opacity .5s ease}
.gameover-screen.show{box-shadow:inset 0 0 80px rgba(255,215,0,.05)}
.gameover-screen.show{opacity:1;pointer-events:auto}
.gameover-title{font-size:38px;margin-bottom:4px}
.gameover-sub{color:#ffd700;font-size:18px;font-weight:bold;margin-bottom:16px}
.gameover-stats{color:#d4c4a8;font-size:15px;margin-bottom:16px;text-align:center;line-height:1.8}
.gameover-stats span{color:#ffd700}
.gameover-achs{color:#c49a6c;font-size:13px;margin-bottom:16px;text-align:center;line-height:1.6}
.gameover-btn{background:#3d3224;border:none;color:#d4c4a8;font-size:16px;font-weight:bold;padding:12px 30px;border-radius:40px;box-shadow:0 4px 0 #1a130e;cursor:pointer;transition:all .06s linear;touch-action:manipulation;margin:4px}
.gameover-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #1a130e}

.game-wrap{background:linear-gradient(145deg,#2a221a,#1f1814);padding:15px;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.9),0 0 80px rgba(255,215,0,.04),inset 0 1px 0 rgba(255,255,255,.05);max-width:500px;width:100%;position:relative;overflow:hidden}
.game-wrap.shake{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-.5deg)}40%{transform:translateX(8px) rotate(.5deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

.top-panel{display:flex;justify-content:space-between;align-items:center;color:#d4c4a8;font-weight:bold;font-size:15px;padding-bottom:6px;flex-wrap:wrap;gap:4px}
.top-panel span,.sound-btn{background:#1a130e;padding:3px 10px;border-radius:30px;box-shadow:inset 0 2px 5px rgba(0,0,0,.7)}
.top-panel .high-score{font-size:12px;color:#ffd700}
.top-panel .level-badge{font-size:12px;color:#c49a6c}
.sound-btn{border:none;color:#d4c4a8;font-size:14px;cursor:pointer;transition:.1s;padding:3px 8px}
.sound-btn:active{transform:scale(.9)}

.progress-wrap{background:#1a130e;border-radius:20px;height:12px;margin:5px 0;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,.7);position:relative}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#8b6b40,#ffd700);border-radius:20px;transition:width .4s ease}
.progress-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:bold;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px;background:#2a221c;border-radius:30px;box-shadow:inset 0 0 0 3px #3a2e22}
.cell{aspect-ratio:1;background:radial-gradient(circle at 50% 60%,#4a3a2a,#3d3224);border-radius:20px;box-shadow:inset 0 -6px 0 #1a130e,0 6px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:transform .08s,box-shadow .2s;cursor:pointer;touch-action:manipulation;position:relative}
.cell:active{transform:scale(.92);box-shadow:inset 0 -2px 0 #1a130e}
.cell .mole{width:100%;height:100%;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px;background:radial-gradient(circle at 30% 30%,#c49a6c,#8b6b40);box-shadow:inset -4px -8px 15px #4a3a2a,0 8px 15px rgba(0,0,0,.4);transform:scale(0);transition:transform .12s cubic-bezier(.34,1.56,.64,1);position:relative}
.cell .mole.show{transform:scale(1);animation:moleBob 1.5s ease-in-out infinite}
.cell .mole.gold{background:radial-gradient(circle at 30% 30%,#ffd966,#b8860b);box-shadow:inset -4px -8px 15px #8b6508,0 0 30px #ffd700}
.cell .mole.bomb{background:radial-gradient(circle at 30% 30%,#555,#111);box-shadow:inset -4px -8px 15px #000,0 0 30px #ff4444;animation:none}
.cell .mole.bomb.show{animation:bombPulse .6s ease-in-out infinite}
.cell .mole.king{background:radial-gradient(circle at 30% 30%,#ffe066,#cc9900);box-shadow:inset -4px -8px 15px #8b6508,0 0 40px #ffd700,0 0 80px #ffd70044}
.cell .mole.fast{background:radial-gradient(circle at 30% 30%,#a0d8ff,#4080cc);box-shadow:inset -4px -8px 15px #204060,0 0 30px #00aaff,0 0 60px #00aaff44}
.cell .mole.ghost{background:radial-gradient(circle at 30% 30%,#c8a0ff,#8040cc);box-shadow:inset -4px -8px 15px #402060,0 0 30px #aa44ff,0 0 60px #aa44ff44}
.cell .mole .emoji{position:relative;z-index:1}
@keyframes moleBob{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.03) translateY(-3px)}}
@keyframes bombPulse{0%,100%{transform:scale(1);box-shadow:inset -4px -8px 15px #000,0 0 30px #ff4444}50%{transform:scale(1.08);box-shadow:inset -4px -8px 15px #000,0 0 50px #ff0000}}

.float-text{position:fixed;font-size:26px;font-weight:bold;pointer-events:none;z-index:9998;text-shadow:0 3px 12px rgba(0,0,0,.9);animation:floatUp .9s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:9997;animation:particleFly .7s ease forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
@media(max-width:500px){.float-text{font-size:20px}.particle{width:4px!important;height:4px!important}}
.levelup-flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0}
.levelup-flash.go{animation:levelFlash .6s ease forwards}
@keyframes levelFlash{0%{background:radial-gradient(circle at 50% 50%,rgba(255,215,0,.3),transparent);opacity:1}100%{opacity:0}}

.combo-display{background:#1a130e;padding:2px 10px;border-radius:30px;font-weight:bold;font-size:14px;text-align:center;transition:all .15s;min-width:50px}
.combo-display.idle{color:#6a5a4a}
.combo-display.active{color:#ffd700;text-shadow:0 0 10px #ffd70066;transform:scale(1.05)}
.combo-display.hot{color:#ff6b35;text-shadow:0 0 15px #ff6b3588;transform:scale(1.1)}

.bottom-panel{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:12px;gap:6px}
.stats{display:flex;gap:6px;background:#1a130e;padding:3px 10px;border-radius:30px;color:#d4c4a8;font-weight:bold;font-size:14px;flex-wrap:wrap;align-items:center}
.stats span{margin:0 2px}
.shop{display:flex;gap:4px;flex-wrap:wrap}
.shop-btn{background:#3d3224;border:none;color:#d4c4a8;font-weight:bold;font-size:12px;padding:7px 10px;border-radius:30px;box-shadow:0 4px 0 #1a130e,0 4px 8px rgba(0,0,0,.4);cursor:pointer;transition:all .06s linear;touch-action:manipulation;min-width:36px;text-align:center}
.shop-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #1a130e}
.shop-btn:disabled{opacity:.35;transform:translateY(4px);box-shadow:0 1px 0 #1a130e;pointer-events:none}
.message{background:#1a130ecc;padding:4px 12px;border-radius:30px;color:#d4c4a8;font-weight:bold;font-size:13px;min-width:80px;text-align:center;flex:0 1 auto}

@media(max-width:640px){
.menu-play{font-size:20px;padding:16px 44px}.menu-title{font-size:28px}.menu-icon{font-size:56px}
.menu-sound,.menu-ach-btn,.menu-back{font-size:14px;padding:10px 20px}
}
@media(max-width:500px){
body{padding:6px}.game-wrap{padding:10px;border-radius:28px}.grid{gap:6px;padding:5px;border-radius:20px}
.cell{font-size:24px;border-radius:14px;min-height:60px;min-width:60px}.cell .mole{font-size:28px;border-radius:14px}
.stats{font-size:11px;padding:2px 6px}.shop-btn{font-size:11px;padding:8px 10px;min-width:36px}.message{font-size:11px;padding:2px 8px;min-width:60px}
.top-panel{font-size:13px;gap:3px}.top-panel span,.sound-btn{padding:3px 7px;font-size:12px}.top-panel .high-score,.top-panel .level-badge{font-size:10px}.combo-display{font-size:11px;padding:2px 6px;min-width:36px}
.bottom-panel{gap:4px;margin-top:8px}.shop{gap:3px}.stats{gap:3px}
.menu-title{font-size:28px}.menu-icon{font-size:56px}.menu-play{font-size:18px;padding:14px 36px}.ach-screen-title{font-size:24px}
.ach-name{font-size:12px}.ach-desc{font-size:11px}
.cell .mole{font-size:24px}.cell{min-height:55px;min-width:55px}
}
@media(max-width:380px){
body{padding:4px}.game-wrap{padding:6px;border-radius:18px}.grid{gap:4px;padding:4px;border-radius:16px}
.cell{font-size:18px;border-radius:12px;min-height:48px;min-width:48px}.cell .mole{font-size:20px;border-radius:12px}
.top-panel span{padding:2px 5px;font-size:10px}.shop-btn{font-size:10px;padding:6px 7px;min-width:30px}
.menu-play{font-size:16px;padding:12px 30px}.menu-title{font-size:24px}.menu-icon{font-size:44px}
.ach-screen-title{font-size:20px}.ach-list{max-width:100%}.ach-item{padding:8px 10px}.ach-icon{font-size:22px;width:30px}
.gameover-title{font-size:30px}.gameover-sub{font-size:16px}.gameover-stats{font-size:13px}.gameover-btn{font-size:14px;padding:10px 22px}
}
</style>
</head>
<body>

<div class="menu-screen" id="menuScreen">
	<div class="menu-icon">🐹</div>
	<div class="menu-title">Крот-собиратель</div>
	<div class="menu-sub">Стучи по кротам, собирай коллекцию!</div>
	<button class="menu-play" id="playBtn">▶ ИГРАТЬ</button>
	<button class="menu-sound" id="menuSoundBtn">🔊</button>
	<button class="menu-ach-btn" id="menuAchBtn">🏆 Достижения</button>
	<button class="menu-back" id="menuBackBtn"><span class="arrow">←</span> На сайт</button>
	<div class="menu-credits">Сделано студией <a href="index.html" class="menu-credit-link">i.</a></div>
</div>

<div class="ach-screen" id="achScreen">
	<div class="ach-screen-title">🏆 Достижения</div>
	<div class="ach-screen-sub" id="achProgress">0 / 12</div>
	<div class="ach-list" id="achList"></div>
	<button class="ach-close-btn" id="achCloseBtn">Закрыть</button>
</div>

<div class="ach-banner" id="achBanner">
	<div class="ach-banner-icon" id="achBannerIcon">🏆</div>
	<div class="ach-banner-info">
		<div class="ach-banner-title" id="achBannerTitle">Достижение!</div>
		<div class="ach-banner-desc" id="achBannerDesc">Описание</div>
	</div>
</div>
<div class="game-wrap" id="gameWrap">
	<div class="levelup-flash" id="levelFlash"></div>
	<div class="gameover-screen" id="gameoverScreen">
		<div class="gameover-title">🎉</div>
		<div class="gameover-sub">Коллекция собрана!</div>
		<div class="gameover-stats" id="gameoverStats">Очков: <span id="goScore">0</span><br>Собрано: <span id="goCollection">12</span>/12<br>Рекорд: <span id="goHighScore">0</span></div>
		<div class="gameover-achs" id="gameoverAchs"></div>
		<button class="gameover-btn" id="goMenuBtn">🏠 В меню</button>
		<button class="gameover-btn" id="goAgainBtn">🔄 Ещё раз</button>
	</div>
	<div class="top-panel">
		<span>💰 <span id="scoreDisplay">0</span></span>
		<span class="level-badge">📊 <span id="levelDisplay">1</span></span>
		<span class="high-score">🏆 <span id="highScoreDisplay">0</span></span>
		<span>⭐ <span id="collectionDisplay">0</span>/12</span>
		<button class="sound-btn" id="soundBtn">🔊</button>
	</div>
	<div class="progress-wrap">
		<div class="progress-bar" id="progressBar"></div>
		<div class="progress-label" id="progressLabel">0/12</div>
	</div>
	<div class="grid" id="grid"></div>
	<div class="bottom-panel">
		<div class="stats">
			<span>🗡️ <span id="shovelLevel">1</span></span>
			<span>🎯 <span id="luckLevel">0</span></span>
			<span class="combo-display idle" id="comboDisplay">🔥 x1</span>
		</div>
		<div class="message" id="messageDisplay">🔨 Копай!</div>
		<div class="shop">
			<button class="shop-btn" id="shovelUpgrade">⬆ Лопата</button>
			<button class="shop-btn" id="luckUpgrade">🍀 Удача</button>
			<button class="shop-btn" id="autoUpgrade">🤖 0</button>
			<button class="shop-btn restart" id="resetBtn">🔄</button>
		</div>
	</div>
</div>

<script>
(function(){
"use strict";

var GRID_SIZE=4,TOTAL_CELLS=GRID_SIZE*GRID_SIZE,COLLECTION_TARGET=12;

var ITEMS=[
	{id:'gold',emoji:'🪙',name:'Золото',rarity:.20,points:1,color:'#ffd700',minLvl:1},
	{id:'silver',emoji:'🥈',name:'Серебро',rarity:.22,points:1,color:'#c0c0c0',minLvl:1},
	{id:'bronze',emoji:'🥉',name:'Бронза',rarity:.25,points:0,color:'#cd7f32',minLvl:1},
	{id:'crystal',emoji:'💎',name:'Кристалл',rarity:.10,points:3,color:'#00ffff',minLvl:1},
	{id:'artifact',emoji:'🏺',name:'Артефакт',rarity:.05,points:5,color:'#ff69b4',minLvl:1},
	{id:'bomb',emoji:'💣',name:'Бомба',rarity:.10,points:-2,color:'#ff4444',minLvl:1},
	{id:'king',emoji:'👑',name:'Король',rarity:.03,points:8,color:'#ffd700',minLvl:2},
	{id:'fast',emoji:'⚡',name:'Молния',rarity:.04,points:4,color:'#00aaff',minLvl:3},
	{id:'ghost',emoji:'👻',name:'Призрак',rarity:.04,points:3,color:'#aa44ff',minLvl:4}
];

var ACHIEVEMENTS=[
	{id:'first_click',name:'👊 Первый удар',desc:'Сделать 1 клик',icon:'👊'},
	{id:'gold_rush',name:'💰 Золотая лихорадка',desc:'Заработать 100 монет',icon:'💰'},
	{id:'gold_million',name:'💎 Миллионер',desc:'Заработать 500 монет',icon:'💎'},
	{id:'bomb_survivor',name:'💣 Живучий',desc:'Поймать 10 бомб',icon:'💣'},
	{id:'king_hunter',name:'👑 Королевский охотник',desc:'Поймать 5 королей',icon:'👑'},
	{id:'fast_catcher',name:'⚡ Молния',desc:'Поймать 10 молний',icon:'⚡'},
	{id:'ghost_hunter',name:'👻 Охотник за призраками',desc:'Поймать 10 призраков',icon:'👻'},
	{id:'combo_master',name:'🔥 Комбо-мастер',desc:'Достичь комбо 15',icon:'🔥'},
	{id:'strategist',name:'📊 Стратег',desc:'Достичь 5 уровня',icon:'📊'},
	{id:'collector_1',name:'⭐ Коллекционер',desc:'Собрать коллекцию 1 раз',icon:'⭐'},
	{id:'collector_3',name:'🌟 Мастер-коллекционер',desc:'Собрать коллекцию 3 раза',icon:'🌟'},
	{id:'digger',name:'🗡️ Землекоп',desc:'Прокачать лопату до 10',icon:'🗡️'}
];

// DOM
var D=function(id){return document.getElementById(id);};
var menuScreen=D('menuScreen'),playBtn=D('playBtn'),menuSoundBtn=D('menuSoundBtn'),menuAchBtn=D('menuAchBtn');
var achScreen=D('achScreen'),achList=D('achList'),achCloseBtn=D('achCloseBtn'),achProgress=D('achProgress');
var achBanner=D('achBanner'),achBannerIcon=D('achBannerIcon'),achBannerTitle=D('achBannerTitle'),achBannerDesc=D('achBannerDesc');
var gameWrap=D('gameWrap'),gridEl=D('grid'),levelFlash=D('levelFlash');
var gameoverScreen=D('gameoverScreen'),goScore=D('goScore'),goCollection=D('goCollection'),goHighScore=D('goHighScore'),goMenuBtn=D('goMenuBtn'),goAgainBtn=D('goAgainBtn'),gameoverAchs=D('gameoverAchs');
var scoreSpan=D('scoreDisplay'),highScoreSpan=D('highScoreDisplay'),collectionSpan=D('collectionDisplay'),levelSpan=D('levelDisplay');
var progressBar=D('progressBar'),progressLabel=D('progressLabel');
var shovelLevelSpan=D('shovelLevel'),luckLevelSpan=D('luckLevel'),comboDisplay=D('comboDisplay');
var messageEl=D('messageDisplay'),soundBtn=D('soundBtn');
var shovelBtn=D('shovelUpgrade'),luckBtn=D('luckUpgrade'),autoBtn=D('autoUpgrade'),resetBtn=D('resetBtn');

// State
var score=0,highScore=0,collection=[],shovelLevel=1,luckLevel=0,autoLevel=0,playerLevel=1;
var cellStates=[],gameActive=false,gameStarted=false;
var messageTimeout=null,spawnTimeout=null,combo=0,comboTimer=null,muted=false,autoInterval=null;
var powerup2x=false,powerupTimer=null;

// Stats for achievements
var stats={totalClicks:0,totalEarnings:0,totalBombs:0,totalKings:0,totalFast:0,totalGhosts:0,bestCombo:0,maxLevel:1,collectionCount:0,maxShovel:1};
var unlocked={};
var bannerTimeout=null;

// Load
try{
	var d=JSON.parse(localStorage.getItem('moleData'));
	if(d){
		if(d.highScore) highScore=d.highScore;
		if(d.stats) for(var k in d.stats) if(stats.hasOwnProperty(k)) stats[k]=d.stats[k];
		if(d.unlocked) for(var k in d.unlocked) if(d.unlocked[k]) unlocked[k]=true;
	}
}catch(e){}

function saveData(){
	try{
		localStorage.setItem('moleData',JSON.stringify({highScore:highScore,stats:stats,unlocked:unlocked}));
	}catch(e){}
}

function getUnlockedCount(){var n=0;for(var id in ACHIEVEMENTS)if(unlocked[ACHIEVEMENTS[id].id])n++;return n;}

function checkAchievements(){
	var prevCount=getUnlockedCount();
	for(var i=0;i<ACHIEVEMENTS.length;i++){
		var a=ACHIEVEMENTS[i];
		if(unlocked[a.id]) continue;
		var ok=false;
		switch(a.id){
			case 'first_click': ok=stats.totalClicks>=1; break;
			case 'gold_rush': ok=stats.totalEarnings>=100; break;
			case 'gold_million': ok=stats.totalEarnings>=500; break;
			case 'bomb_survivor': ok=stats.totalBombs>=10; break;
			case 'king_hunter': ok=stats.totalKings>=5; break;
			case 'fast_catcher': ok=stats.totalFast>=10; break;
			case 'ghost_hunter': ok=stats.totalGhosts>=10; break;
			case 'combo_master': ok=stats.bestCombo>=15; break;
			case 'strategist': ok=stats.maxLevel>=5; break;
			case 'collector_1': ok=stats.collectionCount>=1; break;
			case 'collector_3': ok=stats.collectionCount>=3; break;
			case 'digger': ok=stats.maxShovel>=10; break;
		}
		if(ok){
			unlocked[a.id]=true;
			showAchievementBanner(a);
			saveData();
		}
	}
	if(getUnlockedCount()>prevCount) updateAchUI();
}

function showAchievementBanner(a){
	achBannerIcon.textContent=a.icon||'🏆';
	achBannerTitle.textContent='🏆 Достижение: '+a.name;
	achBannerDesc.textContent=a.desc;
	achBanner.classList.add('show');
	if(bannerTimeout) clearTimeout(bannerTimeout);
	bannerTimeout=setTimeout(function(){achBanner.classList.remove('show');},3000);
	tryVibrate(50);
	soundRare();
}

function openAchievements(){
	renderAchievements();
	achScreen.classList.add('show');
}

function closeAchievements(){
	achScreen.classList.remove('show');
}

function renderAchievements(){
	achList.innerHTML='';
	var n=0;
	for(var i=0;i<ACHIEVEMENTS.length;i++){
		var a=ACHIEVEMENTS[i],u=unlocked[a.id];
		if(u) n++;
		var div=document.createElement('div');
		div.className='ach-item'+(u?' unlocked':'');
		div.innerHTML='<div class="ach-icon">'+(a.icon||'🏆')+'</div><div class="ach-info"><div class="ach-name">'+(u?'✅ ':'')+a.name+'</div><div class="ach-desc">'+a.desc+'</div></div><div class="ach-status">'+(u?'✅':'🔒')+'</div>';
		achList.appendChild(div);
	}
	achProgress.textContent=n+' / '+ACHIEVEMENTS.length;
}

function updateAchUI(){
	renderAchievements();
}

function renderGameOverAchs(){
	var arr=[];
	for(var i=0;i<ACHIEVEMENTS.length;i++){if(unlocked[ACHIEVEMENTS[i].id])arr.push(ACHIEVEMENTS[i]);}
	if(arr.length===0){gameoverAchs.textContent='';return;}
	gameoverAchs.innerHTML='🏆 Получено достижений: '+arr.length+'<br>'+arr.map(function(a){return a.icon+' '+a.name;}).join(' | ');
}

// Audio
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(f,d,t,v){
	if(muted)return;
	try{initAudio();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,audioCtx.currentTime);g.gain.setValueAtTime(v||.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}
}
function soundHit(){playTone(800,.08,'square',.15);}
function soundGold(){playTone(1000,.1,'sine',.2);setTimeout(function(){playTone(1200,.1,'sine',.15);},100);}
function soundBomb(){playTone(150,.3,'sawtooth',.2);}
function soundCombo(){playTone(600,.06,'sine',.1);setTimeout(function(){playTone(900,.08,'sine',.12);},60);}
function soundLevelUp(){playTone(800,.1,'sine',.15);setTimeout(function(){playTone(1000,.1,'sine',.15);},100);setTimeout(function(){playTone(1200,.15,'sine',.18);},200);}
function soundRare(){playTone(900,.08,'sine',.15);setTimeout(function(){playTone(1100,.08,'sine',.15);},80);setTimeout(function(){playTone(1400,.12,'sine',.2);},160);}
function tryVibrate(ms){try{navigator.vibrate(ms);}catch(e){}}

// Effects
function spawnFloatText(x,y,t,c){
	var e=document.createElement('div');e.className='float-text';e.textContent=t;
	e.style.left=(x-15)+'px';e.style.top=(y-20)+'px';e.style.color=c||'#fff';
	document.body.appendChild(e);setTimeout(function(){e.remove();},900);
}
function spawnParticles(x,y,c,n){
	for(var i=0;i<(n||8);i++){
		var p=document.createElement('div');p.className='particle';
		var a=Math.random()*Math.PI*2,d=30+Math.random()*60;
		p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');
		p.style.left=x+'px';p.style.top=y+'px';p.style.background=c||'#ffd700';
		var s=4+Math.random()*7;p.style.width=s+'px';p.style.height=s+'px';
		document.body.appendChild(p);setTimeout(function(){p.remove();},700);
	}
}
function screenShake(){
	gameWrap.classList.remove('shake');void gameWrap.offsetWidth;
	gameWrap.classList.add('shake');setTimeout(function(){gameWrap.classList.remove('shake');},300);
}

function updateCombo(){
	if(combo>=10){comboDisplay.textContent='🔥 x'+Math.min(combo,99);comboDisplay.className='combo-display hot';}
	else if(combo>0){comboDisplay.textContent='🔥 x'+Math.min(combo,99);comboDisplay.className='combo-display active';}
	else{comboDisplay.textContent='🔥 x1';comboDisplay.className='combo-display idle';}
}
function addCombo(){
	combo++;if(combo>stats.bestCombo){stats.bestCombo=combo;saveData();}
	if(comboTimer)clearTimeout(comboTimer);
	comboTimer=setTimeout(function(){combo=0;updateCombo();},1500);
	updateCombo();if(combo>=5&&combo%5===0)soundCombo();if(combo>=10)tryVibrate(20);
	checkAchievements();
}
function getComboMultiplier(){return 1+Math.floor(combo/5)*.5;}

function getActiveItems(){return ITEMS.filter(function(i){return i.minLvl<=playerLevel;});}

function generateItem(){
	var items=getActiveItems().map(function(i){return{id:i.id,emoji:i.emoji,name:i.name,rarity:i.rarity,points:i.points,color:i.color,minLvl:i.minLvl};});
	var lb=luckLevel*.03;
	items.forEach(function(i){
		if(i.id==='crystal')i.rarity+=lb;
		else if(i.id==='artifact')i.rarity+=lb*.5;
		else if(i.id==='king')i.rarity+=lb*.3;
		else if(i.id==='bomb')i.rarity-=lb*.5;
	});
	var sum=items.reduce(function(a,i){return a+Math.max(0,i.rarity);},0);
	items.forEach(function(i){i.rarity=Math.max(0,i.rarity/sum);});
	var r=Math.random(),acc=0;
	for(var i of items){acc+=i.rarity;if(r<=acc)return i;}
	return items[0];
}

function checkLevelUp(){
	var nl=1+Math.floor(score/25);
	if(nl!==playerLevel){
		playerLevel=nl;levelSpan.textContent=playerLevel;stats.maxLevel=Math.max(stats.maxLevel,playerLevel);saveData();
		soundLevelUp();tryVibrate(30);
		levelFlash.classList.remove('go');void levelFlash.offsetWidth;
		levelFlash.classList.add('go');
		setMessage('📊 Уровень '+playerLevel+'!');
		if(playerLevel===2)setMessage('👑 Появился Король!');
		else if(playerLevel===3)setMessage('⚡ Появилась Молния!');
		else if(playerLevel===4)setMessage('👻 Появился Призрак!');
		checkAchievements();
	}
}

function spawnMole(idx){
	if(!gameActive||cellStates[idx].active)return;
	var item=generateItem();
	cellStates[idx].active=true;cellStates[idx].type=item;
	var cell=gridEl.children[idx],mole=cell.querySelector('.mole');
	mole.className='mole';
	if(item.id==='gold'||item.id==='crystal'||item.id==='artifact'||item.id==='king')mole.classList.add('gold');
	if(item.id==='king')mole.classList.add('king');
	else if(item.id==='fast')mole.classList.add('fast');
	else if(item.id==='ghost')mole.classList.add('ghost');
	else if(item.id==='bomb')mole.classList.add('bomb');
	var es=mole.querySelector('.emoji');if(es)es.textContent=item.emoji;
	mole.classList.add('show');
	var du=1500+Math.random()*1500;
	if(item.id==='gold')du=1000+Math.random()*800;
	else if(item.id==='artifact')du=800+Math.random()*600;
	else if(item.id==='king')du=900+Math.random()*600;
	else if(item.id==='fast')du=500+Math.random()*300;
	else if(item.id==='ghost')du=2000+Math.random()*1000;
	else if(item.id==='bomb')du=2000+Math.random()*1000;
	du*=Math.max(.4,1-score*.00004);
	if(cellStates[idx].timer)clearTimeout(cellStates[idx].timer);
	cellStates[idx].timer=setTimeout(function(){hideMole(idx);},du);
	// Ghost teleport
	if(item.id==='ghost'){
		setTimeout(function(){
			if(!cellStates[idx]||!cellStates[idx].active)return;
			var gi=cellStates[idx].type;hideMole(idx);
			var inv=[];
			for(var i=0;i<TOTAL_CELLS;i++){if(!cellStates[i].active)inv.push(i);}
			if(inv.length>0){
				var ni=inv[Math.floor(Math.random()*inv.length)];
				cellStates[ni].active=true;cellStates[ni].type=gi;
				var nc=gridEl.children[ni],nm=nc.querySelector('.mole');
				nm.className='mole ghost';var ies=nm.querySelector('.emoji');if(ies)ies.textContent='👻';
				nm.classList.add('show');
				if(cellStates[ni].timer)clearTimeout(cellStates[ni].timer);
				cellStates[ni].timer=setTimeout(function(){hideMole(ni);},du*.4);
			}
		},1000+Math.random()*500);
	}
}

function hideMole(idx){
	if(!cellStates[idx]||!cellStates[idx].active)return;
	cellStates[idx].active=false;
	if(cellStates[idx].timer){clearTimeout(cellStates[idx].timer);cellStates[idx].timer=null;}
	var c=gridEl.children[idx];if(c){var m=c.querySelector('.mole');if(m)m.classList.remove('show');}
}

function getCellCenter(c){
	var r=c.getBoundingClientRect();
	return{x:r.left+r.width/2,y:r.top+r.height/2};
}

function finishGame(){
	gameActive=false;
	if(spawnTimeout)clearTimeout(spawnTimeout);
	if(autoInterval)clearInterval(autoInterval);
	if(powerupTimer)clearTimeout(powerupTimer);powerup2x=false;
	stats.collectionCount++;saveData();
	goScore.textContent=score;goCollection.textContent=collection.length;goHighScore.textContent=highScore;
	renderGameOverAchs();
	gameoverScreen.classList.add('show');
	setMessage('🎉 Коллекция собрана!');
	checkAchievements();
}

function handleCellClick(idx){
	if(!gameActive)return;
	var state=cellStates[idx],cell=gridEl.children[idx],pos=getCellCenter(cell);
	if(!state.active){setMessage('Здесь ничего нет');return;}
	hideMole(idx);var item=state.type;
	var cm=getComboMultiplier();
	var pts=Math.round(item.points*shovelLevel*cm);
	if(powerup2x&&pts>0)pts*=2;
	var crit=false;
	if(pts>0&&Math.random()<.05+luckLevel*.02){pts=Math.round(pts*2);crit=true;}
	stats.totalClicks++;
	if(item.id==='bomb')stats.totalBombs++;
	if(item.id==='king')stats.totalKings++;
	if(item.id==='fast')stats.totalFast++;
	if(item.id==='ghost')stats.totalGhosts++;
	if(pts>0){
		score+=pts;stats.totalEarnings+=pts;
		soundHit();
		if(item.id==='gold'||item.id==='crystal'||item.id==='artifact'||item.id==='king')soundGold();
		if(item.id==='king'){soundRare();tryVibrate(40);}
		if(item.id==='fast')soundRare();
		addCombo();
		setMessage((crit?'КРИТ! ':'')+'+'+pts+' '+item.emoji);
	}else if(pts<0){
		score=Math.max(0,score+pts);
		soundBomb();combo=0;updateCombo();screenShake();
		setMessage('💥 '+item.name);
	}else{setMessage('😐 '+item.emoji);}
	spawnFloatText(pos.x-15,pos.y-20,(crit?'КРИТ! ':'')+pts,item.color||'#fff');
	spawnParticles(pos.x,pos.y,item.color||'#ffd700',pts>0?12:18);
	checkLevelUp();
	if(item.id==='king')spawnParticles(pos.x,pos.y,'#ffd700',30);
	if(!collection.includes(item.emoji)){
		collection.push(item.emoji);
		if(collection.length<COLLECTION_TARGET){setMessage('⭐ Новый предмет! '+item.emoji);tryVibrate(30);spawnParticles(pos.x,pos.y,'#ffd700',20);}
		if(collection.length>=COLLECTION_TARGET){finishGame();}
	}
	updateUI();saveData();checkAchievements();
	if(gameActive&&pts>=0){setTimeout(function(){if(!cellStates[idx].active)spawnMole(idx);},300+Math.random()*800);}
}

function scheduleSpawn(){
	if(!gameActive)return;
	var base=2000,reduction=Math.min(1200,Math.floor(score/20)*50),intv=Math.max(700,base-reduction)+Math.random()*700;
	spawnTimeout=setTimeout(function(){
		if(!gameActive)return;
		var count=1+Math.floor(Math.random()*Math.min(5,1+Math.floor(playerLevel/2)+Math.floor(score/40)));
		for(var i=0;i<count;i++){
			setTimeout(function(n){return function(){
				if(!gameActive)return;
				var inv=[];for(var j=0;j<TOTAL_CELLS;j++){if(!cellStates[j].active)inv.push(j);}
				if(inv.length>0){var idx=inv[Math.floor(Math.random()*inv.length)];spawnMole(idx);}
			};}(i),i*150);
		}
		scheduleSpawn();
	},intv);
}

function startSpawning(){
	if(spawnTimeout)clearTimeout(spawnTimeout);
	for(var i=0;i<2;i++){setTimeout(function(){
		if(gameActive){var inv=[];for(var j=0;j<TOTAL_CELLS;j++){if(!cellStates[j].active)inv.push(j);}if(inv.length>0)spawnMole(inv[Math.floor(Math.random()*inv.length)]);}
	},i*400+300);}
	scheduleSpawn();
}

function startAutoCollect(){
	if(autoInterval)clearInterval(autoInterval);if(autoLevel<=0)return;
	autoInterval=setInterval(function(){
		if(!gameActive)return;
		var ac=[];for(var i=0;i<TOTAL_CELLS;i++){if(cellStates[i].active)ac.push(i);}if(ac.length===0)return;
		var tc=Math.min(ac.length,autoLevel);
		for(var k=0;k<tc;k++){
			var idx=ac.splice(Math.floor(Math.random()*ac.length),1)[0],st=cellStates[idx];
			if(st.active){hideMole(idx);
				var pts=Math.round(st.type.points*shovelLevel*.5);
				if(pts>0)score+=pts;else if(pts<0)score=Math.max(0,score+pts);
				if(!collection.includes(st.type.emoji)){collection.push(st.type.emoji);if(collection.length>=COLLECTION_TARGET)finishGame();}
				updateUI();
			}
		}
	},3000/autoLevel);
}

function updateUI(){
	scoreSpan.textContent=score;
	if(score>highScore){highScore=score;saveData();}
	highScoreSpan.textContent=highScore;levelSpan.textContent=playerLevel;
	collectionSpan.textContent=collection.length;
	var pct=collection.length/COLLECTION_TARGET*100;
	progressBar.style.width=pct+'%';progressLabel.textContent=collection.length+'/'+COLLECTION_TARGET;
	shovelLevelSpan.textContent=shovelLevel;luckLevelSpan.textContent=luckLevel;
	shovelBtn.disabled=!gameActive;luckBtn.disabled=!gameActive;autoBtn.disabled=!gameActive;
	autoBtn.textContent='🤖 '+autoLevel;
}

function setMessage(t){
	messageEl.textContent=t;
	if(messageTimeout)clearTimeout(messageTimeout);
	messageTimeout=setTimeout(function(){if(gameActive)messageEl.textContent='🔨 Копай!';else messageEl.textContent='🏁';},2500);
}

function upgradeShovel(){
	if(!gameActive)return;
	var cost=10*shovelLevel;if(score<cost){setMessage('Нужно '+cost+'💰');return;}
	score-=cost;shovelLevel++;if(shovelLevel>stats.maxShovel){stats.maxShovel=shovelLevel;saveData();}
	soundGold();setMessage('⬆ Лопата '+shovelLevel);updateUI();checkAchievements();
}
function upgradeLuck(){
	if(!gameActive)return;
	var cost=15*(luckLevel+1);if(score<cost){setMessage('Нужно '+cost+'💰');return;}
	score-=cost;luckLevel++;soundGold();setMessage('🍀 Удача '+luckLevel);updateUI();
}
function upgradeAuto(){
	if(!gameActive)return;
	var cost=30*(autoLevel+1);if(score<cost){setMessage('Нужно '+cost+'💰');return;}
	score-=cost;autoLevel++;soundGold();setMessage('🤖 Авто '+autoLevel);
	if(autoInterval)clearInterval(autoInterval);startAutoCollect();updateUI();
}
function toggleSound(){
	muted=!muted;var icon=muted?'🔇':'🔊';
	soundBtn.textContent=icon;menuSoundBtn.textContent=icon;
	if(gameStarted)setMessage(muted?'🔇 Без звука':'🔊 Звук включён');
}

function resetGame(){
	if(spawnTimeout)clearTimeout(spawnTimeout);if(autoInterval)clearInterval(autoInterval);if(comboTimer)clearTimeout(comboTimer);
	if(powerupTimer)clearTimeout(powerupTimer);powerup2x=false;
	for(var i=0;i<TOTAL_CELLS;i++){
		if(cellStates[i]){if(cellStates[i].timer)clearTimeout(cellStates[i].timer);cellStates[i].active=false;cellStates[i].type=null;cellStates[i].timer=null;}
		var c=gridEl.children[i];if(c){var m=c.querySelector('.mole');if(m)m.classList.remove('show');}
	}
	document.querySelectorAll('.float-text,.particle').forEach(function(e){e.remove();});
	achBanner.classList.remove('show');
	score=0;collection=[];shovelLevel=1;luckLevel=0;autoLevel=0;playerLevel=1;combo=0;
	updateCombo();gameActive=true;updateUI();setMessage('🔄 Новая игра');startSpawning();
	if(autoLevel>0)startAutoCollect();setTimeout(function(){setMessage('🔨 Копай!');},2000);
}

function createGrid(){
	gridEl.innerHTML='';cellStates=[];
	for(var i=0;i<TOTAL_CELLS;i++){
		var cell=document.createElement('div');cell.className='cell';
		var mole=document.createElement('div');mole.className='mole';
		var emoji=document.createElement('span');emoji.className='emoji';emoji.textContent='🪙';
		mole.appendChild(emoji);cell.appendChild(mole);
		cell.addEventListener('click',(function(idx){return function(){handleCellClick(idx);};})(i));
		cell.addEventListener('touchstart',(function(idx){return function(e){e.preventDefault();handleCellClick(idx);};})(i),{passive:false});
		gridEl.appendChild(cell);cellStates.push({active:false,type:null,timer:null});
	}
}

function backToMenu(){
	gameoverScreen.classList.remove('show');
	if(spawnTimeout)clearTimeout(spawnTimeout);if(autoInterval)clearInterval(autoInterval);if(comboTimer)clearTimeout(comboTimer);
	if(powerupTimer)clearTimeout(powerupTimer);powerup2x=false;
	document.querySelectorAll('.float-text,.particle').forEach(function(e){e.remove();});
	gameActive=false;gameStarted=false;menuScreen.classList.remove('hidden');
}

function startGame(){gameStarted=true;gameActive=true;menuScreen.classList.add('hidden');createGrid();updateUI();setMessage('🔨 Копай!');startSpawning();}
function playAgain(){gameoverScreen.classList.remove('show');resetGame();}

playBtn.addEventListener('click',startGame);
playBtn.addEventListener('touchstart',function(e){e.preventDefault();startGame();},{passive:false});
menuSoundBtn.addEventListener('click',toggleSound);
menuSoundBtn.addEventListener('touchstart',function(e){e.preventDefault();toggleSound();},{passive:false});
menuAchBtn.addEventListener('click',openAchievements);
var menuBackBtn=D('menuBackBtn');
menuBackBtn.addEventListener('click',function(){window.location.href='index.html';});
achCloseBtn.addEventListener('click',closeAchievements);
shovelBtn.addEventListener('click',upgradeShovel);
luckBtn.addEventListener('click',upgradeLuck);
autoBtn.addEventListener('click',upgradeAuto);
resetBtn.addEventListener('click',resetGame);
soundBtn.addEventListener('click',toggleSound);
goMenuBtn.addEventListener('click',backToMenu);
goAgainBtn.addEventListener('click',playAgain);
document.addEventListener('keydown',function(e){
	if(!gameStarted)return;
	if(e.key==='r'||e.key==='R')resetGame();
	else if(e.key==='s'||e.key==='S')upgradeShovel();
	else if(e.key==='l'||e.key==='L')upgradeLuck();
	else if(e.key==='a'||e.key==='A')upgradeAuto();
	else if(e.key==='m'||e.key==='M')toggleSound();
});

// Mobile class
if(/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<640){
	document.body.classList.add('is-mobile');
	document.documentElement.style.setProperty('--cell-size','56px');
}

// Init
highScoreSpan.textContent=highScore;
})();
</script>
</body>
