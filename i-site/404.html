<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — і.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --muted: #999;
      --dim: #666;
      --border: #e8e8e5;
      --heading-color: #bbb;
      --footer-color: #ccc;
    }

    [data-theme="dark"] {
      --bg: #0b0b12;
      --text: #f0ece4;
      --muted: #666;
      --dim: #888;
      --border: #1e1e26;
      --heading-color: #555;
      --footer-color: #333;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Unbounded', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    .center {
      text-align: center;
      padding: 32px;
    }

    .center__code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.04em;
      opacity: 0.15;
    }

    .center__title {
      font-size: 20px;
      font-weight: 600;
      margin-top: -12px;
      letter-spacing: -0.01em;
    }

    .center__desc {
      font-size: 13px;
      font-weight: 300;
      color: var(--dim);
      line-height: 1.7;
      margin-top: 16px;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    .center__link {
      display: inline-block;
      margin-top: 28px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 28px;
      transition: border-color 0.25s;
      letter-spacing: 0.03em;
    }

    .center__link:hover {
      border-color: var(--border-hover);
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--border);
      border: none;
      cursor: pointer;
      padding: 0;
      border-radius: 100px;
      width: 42px;
      height: 22px;
      display: flex;
      align-items: center;
      transition: background 0.3s;
      z-index: 10;
    }

    .theme-toggle__knob {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg);
      transition: transform 0.3s, background 0.3s;
      margin: 0 3px;
    }

    [data-theme="dark"] .theme-toggle__knob {
      transform: translateX(20px);
    }

    /* ─── mobile notice ─── */
    .mobile-notice {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      color: var(--text);
      font-family: 'Unbounded', sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    .mobile-notice--dismiss {
      opacity: 0;
    }

    .mobile-notice h2 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .mobile-notice p {
      font-size: 12px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--dim);
      max-width: 340px;
    }

    .mobile-notice__btn {
      margin-top: 24px;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.25s;
    }

    .mobile-notice__btn:hover {
      border-color: var(--border-hover);
    }

    @media (max-width: 480px) {
      .mobile-notice {
        display: flex;
      }
      .center {
        padding: 24px 16px;
      }
      .center__code {
        font-size: 80px;
      }
      .center__title {
        font-size: 17px;
        margin-top: -8px;
      }
      .center__desc {
        font-size: 12px;
      }
      .theme-toggle {
        top: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-notice" id="mobileNotice">
    <h2>На телефоне может быть нестабильно</h2>
    <p>Сайт лучше открывать на компьютере или через «Версия для ПК» в меню браузера. Но вы можете попробовать.</p>
    <button class="mobile-notice__btn" id="mobileTryBtn">Попробовать</button>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
    <span class="theme-toggle__knob"></span>
  </button>
  <div class="center">
    <div class="center__code">404</div>
    <div class="center__title">Страница не найдена</div>
    <div class="center__desc">
      Похоже, здесь ничего нет. Может, вы ошиблись адресом или страница была перемещена.
    </div>
    <a href="https://doinwor.github.io/go-ecosystem/i-site/" class="center__link">На главную</a>
  </div>
  <script>
    (function() {
      const toggle = document.getElementById('themeToggle');
      const stored = localStorage.getItem('i-theme');
      if (stored) document.documentElement.setAttribute('data-theme', stored);

      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', next || '');
        localStorage.setItem('i-theme', next || '');
      });

      var isMobile = window.innerWidth < 480 || /Mobi|Android/i.test(navigator.userAgent);
      if (isMobile && !sessionStorage.getItem('i-mobile-dismiss')) {
        var notice = document.getElementById('mobileNotice');
        var btn = document.getElementById('mobileTryBtn');
        if (btn) {
          btn.addEventListener('click', function() {
            notice.classList.add('mobile-notice--dismiss');
            setTimeout(function() { notice.style.display = 'none'; }, 350);
            sessionStorage.setItem('i-mobile-dismiss', '1');
          });
        }
      } else if (isMobile) {
        var notice = document.getElementById('mobileNotice');
        if (notice) notice.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
